name: Daily Update

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 22 * * *'  # 每天北京时间 6:00
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 Python 依赖
        run: pip install -r backend/requirements.txt

      - name: 运行后端测试
        run: python -m unittest discover backend/tests

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装前端依赖
        run: npm ci

      - name: 运行数据更新脚本
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          LLM_API_KEY: ${{ secrets.MIMO_API_KEY }}
          LLM_BASE_URL: ${{ secrets.MIMO_BASE_URL }}
          LLM_MODEL: ${{ secrets.MIMO_MODEL }}
          APP_TIMEZONE: 'Asia/Shanghai'
          MIN_SCORE_AVG: '6.0'
          MIN_SCORE_AVG_NEWS: '5.0'
          FILTER_AFFILIATION: 'false'
          WEIGHT_FRONTIER: '0.40'
          WEIGHT_PRACTICAL: '0.35'
          WEIGHT_RIGOR: '0.25'
          FEATURED_THRESHOLD: '7.5'
          MAX_TOTAL_ITEMS: '500'
          REQUEST_DELAY_MIN: '3'
          REQUEST_DELAY_MAX: '8'
          MAX_RETRIES: '3'
          DISABLE_SSL_VERIFY: 'false'
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          OPENALEX_MAILTO: ${{ secrets.OPENALEX_MAILTO }}
        run: python -m backend.main

      - name: 配置 Git
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 提交更新的数据文件
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git pull --rebase --autostash origin main
          git add public/data.json public/daily_reports.json public/feed.xml
          git diff --cached --quiet || git commit -m "chore: update data $(date +%Y-%m-%d)"
          git push

      - name: 构建前端
        run: npm run build

      - name: 上传 Pages 构件
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
